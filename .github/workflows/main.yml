name: Gerar .exe Windows
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pygame pyinstaller
    - run: pyinstaller --noconfirm --onedir --windowed --name "Missao_na_Escola" main.py
    - uses: actions/upload-artifact@v4
      with:
        name: Missao_na_Escola_EXE
        path: dist/Missao_na_Escola/
        
